<!DOCTYPE html>

<title>Κατάργηση εγγραφής – Home Balance</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#f9f6ef;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border-radius:16px;padding:48px 40px;max-width:480px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
  .logo{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:32px}
  h1{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:12px}
  p{font-size:15px;color:#555;line-height:1.6;margin-bottom:24px}
  .btn{display:inline-block;background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:14px 28px;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity .2s}
  .btn:hover{opacity:.85}
  .success{color:#2d7a2d;font-weight:600}
  .error{color:#b00020;font-weight:600}
  .spinner{width:32px;height:32px;border:3px solid #e0d9cc;border-top-color:#1a1a1a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
